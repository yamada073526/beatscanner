[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Phase 2a: 毎朝 JST 4:00 (= UTC 19:00) に全ウォッチリスト銘柄の market_insights を更新
[[crons]]
schedule = "0 19 * * *"
command = "curl -s -X POST -H \"X-Cron-Secret: $CRON_SECRET\" https://beatscanner-production.up.railway.app/api/insights/refresh/batch"

# v97 Round 2: profile-summary (会社概要 LLM 和文要約) cron warmup
# user dogfood 「会社概要は 10 秒前後あるので短縮頂きたい」 対策。
# insights cron の 30 分後 JST 4:30 (UTC 19:30) に watchlist + S&P top 30 = 最大 50 銘柄を warmup。
# memory cache (_SUMMARY_CACHE) は process scope のため daily refresh が必要。
# cost: 50 銘柄 × Claude Haiku $0.003-0.005 = $0.15-0.25/day = ¥25-40/day
[[crons]]
schedule = "30 19 * * *"
command = "curl -s -X POST -H \"X-Cron-Secret: $CRON_SECRET\" --max-time 300 https://beatscanner-production.up.railway.app/api/profile-summary/refresh/batch > /dev/null 2>&1"

# v40+: 「今日の注目」の cold cache 問題対策。
# /api/movers の在メモリキャッシュ TTL は 20 分・cold 時 10-15 秒かかるため、
# 15 分毎に curl で叩いてキャッシュを常時温める。
# 効果: ユーザーが LP を開いた時に常にキャッシュヒット (300-500ms 応答)。
[[crons]]
schedule = "*/15 * * * *"
command = "curl -s https://beatscanner-production.up.railway.app/api/movers > /dev/null 2>&1"

# v40+ 体感速度改善: Railway インスタンスの cold start (~5-10s) を防止する keepalive。
# 毎 10 分 /health を叩いてインスタンスを起動状態に保つ。
# 効果: ユーザーの初回アクセス時に backend が常に warm → 体感ロード -3〜5s。
[[crons]]
schedule = "*/10 * * * *"
command = "curl -s https://beatscanner-production.up.railway.app/health > /dev/null 2>&1"

# §11-C-2 動的 OGP: 毎日 ET 6:00 (= UTC 11:00) に再生成。
# 米国投資家の朝の SNS チェックタイミング (寄付き前) に合わせて画像を最新化。
# 6 体エージェントレビュー全員一致採用。
[[crons]]
schedule = "0 11 * * *"
command = "curl -s -X POST https://beatscanner-production.up.railway.app/api/og-image-today/regenerate > /dev/null 2>&1"

# Cup-with-Handle Phase 2.1: nightly scan (2026-05-17、 multi-review 6 体合議 verdict)
# SRE verdict: UTC 23:00 (= ET 18:00 / JST 8:00)、 米国市場 close 1.5h 後で日足 OHLC 確定済
# S&P500 top 200 銘柄を _detect_cup_handle で scan → pattern_signals に upsert
[[crons]]
schedule = "0 23 * * *"
command = "curl -s -X POST -H \"X-Cron-Secret: $CRON_SECRET\" https://beatscanner-production.up.railway.app/api/cron/cup-scan > /dev/null 2>&1"

# Cup-with-Handle Phase 2.3: nightly digest mail (cup-scan 完了から 15 分後)
# UTC 23:15 = ET 18:15 / JST 8:15。 scan 結果の transition を集約して Premium user に digest 配信
[[crons]]
schedule = "15 23 * * *"
command = "curl -s -X POST -H \"X-Cron-Secret: $CRON_SECRET\" https://beatscanner-production.up.railway.app/api/cron/cup-notify > /dev/null 2>&1"

# v121→v122 RS Screener Phase 1.5: nightly RS scan (cup-scan 完了から 30 分後)
# UTC 23:30 = ET 18:30 / JST 8:30。 SP500 全 500 銘柄を _compute_rs() で集約 → rs_ratings 24h cache
# William O'Neil CAN SLIM L 条件 (RS≥80)、 日本人向け米国株 retail で唯一の RS screener 装備
# 実行時間目安: 197 銘柄処理で ~3 分 (FMP rate limit 内、 cup-scan と直列で安全)
[[crons]]
schedule = "30 23 * * *"
command = "curl -s -X POST -H \"X-Cron-Secret: $CRON_SECRET\" --max-time 600 https://beatscanner-production.up.railway.app/api/cron/rs-scan > /dev/null 2>&1"

# v122: article auto-publish digest (記事 cron 完了から数時間後、 朝の dogfood 帯)
# v124 朝 R4 (user 要望: メール 5 時希望、 遅くとも 7 時): 22:00 → 21:00 UTC に 1 時間前倒し。
# Railway native cron は定時発火 (遅延なし)、 21:00 UTC = JST 06:00 着想定。
# 7 時上限クリア。 5 時希望は dogfood 1 週間後に article 生成時刻 さらに前倒し可能か判断。
# 既存 cup-notify と同じ Resend mailer + notification_dispatch_log dedup (pattern_type='article')
# 真因: v121 dogfood で「記事生成されても気付けない」 課題発覚 → 通知で起床時 dogfood 経路を確立
[[crons]]
schedule = "0 21 * * *"
command = "curl -s -X POST -H \"X-Cron-Secret: $CRON_SECRET\" --max-time 120 https://beatscanner-production.up.railway.app/api/cron/article-notify > /dev/null 2>&1"

# Cup-with-Handle Phase 2.1: monthly retention cleanup (毎月 1 日 UTC 02:00 = JST 11:00)
# SRE verdict: Supabase Free 500MB 圧迫回避のため 90 日より古い pattern_signals を削除
[[crons]]
schedule = "0 2 1 * *"
command = "curl -s -X POST -H \"X-Cron-Secret: $CRON_SECRET\" https://beatscanner-production.up.railway.app/api/cron/pattern-signals-cleanup > /dev/null 2>&1"
