<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- 背景：ダークネイビーの円 -->
  <circle cx="48" cy="48" r="46" fill="#0B1120"/>

  <!-- EKG QRS波形：左から心拍スパイクを描画 -->
  <path
    d="M10,52 L22,52 L27,67 L35,17 L43,67 L49,52"
    stroke="#4B9EFF"
    stroke-width="4"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- ジャンクションドット：EKG終端 兼 シグナル発信源 -->
  <circle cx="49" cy="52" r="5" fill="#4B9EFF"/>

  <!-- シグナルアーク（内側）：フル opacity -->
  <path
    d="M56,46 A7 7 0 0 1 56,58"
    stroke="#4B9EFF"
    stroke-width="4"
    fill="none"
    stroke-linecap="round"
  />

  <!-- シグナルアーク（外側）：50% opacity で減衰を表現 -->
  <path
    d="M64,40 A13 13 0 0 1 64,64"
    stroke="#4B9EFF"
    stroke-width="3.5"
    fill="none"
    stroke-linecap="round"
    opacity="0.5"
  />
</svg>
