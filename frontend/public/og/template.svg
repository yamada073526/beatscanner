    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <rect x="0" y="0" width="1200" height="4" fill="url(#goldGrad)"/>
  <rect x="64" y="80" width="3" height="470" fill="url(#goldGrad)" opacity="0.7"/>

  <g transform="translate(96, 68)">
    <circle cx="28" cy="28" r="28" fill="rgba(11,17,32,0.8)" stroke="#4B9EFF" stroke-width="1.5"/>
    <path d="M8,28 L14,28 L18,40 L26,14 L33,40 L38,28 L44,28"
