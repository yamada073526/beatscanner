    <rect x="8" y="60" width="24" height="100" fill="#34EF81" rx="2"/>
    <line x1="70" y1="20" x2="70" y2="230" stroke="#F87171" stroke-width="1.5"/>
    <rect x="58" y="50" width="24" height="120" fill="#F87171" rx="2"/>
    <line x1="120" y1="10" x2="120" y2="200" stroke="#34EF81" stroke-width="1.5"/>
