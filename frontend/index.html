<!doctype html>
<html lang="ja" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- ダークモード default 化 (handover v72、 2026-05-16): FOUC (Flash of Unstyled Content)
         回避のため <html data-theme="dark"> を初期 attribute で指定。
         React 起動後 src/utils/darkMode.js の initDarkMode() が localStorage を読んで上書きする
         (既存 user で light 保存していれば light に切り替わる)。
         新規 user (localStorage 空) は dark default が維持される。 -->
    <script>
      // localStorage に light 設定があれば即座に上書き (React 起動前 FOUC 回避)。
      // 失敗しても <html data-theme="dark"> のままで安全。
      try {
        var saved = localStorage.getItem('chart_dark_mode');
        if (saved === 'false') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch (e) { /* localStorage 利用不可環境では dark default のまま */ }
    </script>

    <!-- §11-C-1 GSC: Google Search Console 所有権確認タグ。
         CLAUDE.md「確認状態を維持するため、確認後も削除しないこと」(GSC 公式注意書き)。 -->
