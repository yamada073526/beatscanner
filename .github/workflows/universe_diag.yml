name: Universe Diag (FMP company-screener) — one-shot

# task 5 (handover v273) 調査用の一回限り診断。scan universe からメガキャップ (ABBV/ABT/C/...)
# が 06-26 に脱落した根本原因を確定する。FMP /stable/company-screener を本番
# _fetch_market_cap_top_n と同一パラメータで叩き、(A) limit truncation x FMP 返却順 /
# (B) filter 除外 のどちらかを切り分ける。結果取得後にこの workflow は main から削除する。

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
    steps:
      - name: Setup
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq curl

      - name: Guard FMP_API_KEY
        run: |
          if [ -z "$FMP_API_KEY" ]; then echo "::error::FMP_API_KEY 未設定"; exit 1; fi

      - name: Probe FMP company-screener
        run: |
          set +e
          PROBE="ABBV ABT C BX F CMG DG JBL AAPL MSFT NVDA"
          base="https://financialmodelingprep.com/stable/company-screener?marketCapMoreThan=500000000&priceMoreThan=5&volumeMoreThan=200000&isActivelyTrading=true&isEtf=false&isFund=false&exchange=NASDAQ,NYSE"
          base_noexch="https://financialmodelingprep.com/stable/company-screener?marketCapMoreThan=500000000&priceMoreThan=5&volumeMoreThan=200000&isActivelyTrading=true&isEtf=false&isFund=false"
          fetch() { curl -s --max-time 90 "$1&limit=$2&apikey=$FMP_API_KEY"; }

          S="$GITHUB_STEP_SUMMARY"
          echo "## Universe Diag $(date -u +%FT%TZ)" >> "$S"

          r3000=$(fetch "$base" 3000)
          r10000=$(fetch "$base" 10000)
          rnoexch=$(fetch "$base_noexch" 10000)
          n3=$(echo "$r3000" | jq 'length' 2>/dev/null)
          n10=$(echo "$r10000" | jq 'length' 2>/dev/null)
          nne=$(echo "$rnoexch" | jq 'length' 2>/dev/null)

          echo "- returned: prod(limit=3000,exch)=**$n3** / limit=10000,exch=**$n10** / limit=10000,no-exch=**$nne**" >> "$S"
          echo "- sample record keys: \`$(echo "$r3000" | jq -r '.[0]|keys|join(",")' 2>/dev/null)\`" >> "$S"
          echo "- prod(3000) head symbols: \`$(echo "$r3000" | jq -r '.[0:6]|map(.symbol)|join(",")' 2>/dev/null)\`" >> "$S"
          echo "- prod(3000) head marketCap: \`$(echo "$r3000" | jq -r '.[0:6]|map(.marketCap|tostring)|join(",")' 2>/dev/null)\`" >> "$S"
          echo "- prod(3000) tail symbols: \`$(echo "$r3000" | jq -r '.[-4:]|map(.symbol)|join(",")' 2>/dev/null)\`" >> "$S"
          echo "- prod(3000) min marketCap (tail): \`$(echo "$r3000" | jq -r 'map(.marketCap)|min' 2>/dev/null)\`" >> "$S"
          echo "- prod(3000) sorted desc by marketCap? **$(echo "$r3000" | jq -r 'if (map(.marketCap)) == (map(.marketCap)|sort|reverse) then "YES" else "NO" end' 2>/dev/null)**" >> "$S"

          echo "" >> "$S"
          echo "| ticker | in prod(3000) | in 10000(exch) | in 10000(no-exch) | marketCap | rank-by-mktcap(10000) |" >> "$S"
          echo "|---|---|---|---|---|---|" >> "$S"
          for t in $PROBE; do
            i3=$(echo "$r3000" | jq -r --arg t "$t" 'any(.[]?; .symbol==$t)' 2>/dev/null)
            i10=$(echo "$r10000" | jq -r --arg t "$t" 'any(.[]?; .symbol==$t)' 2>/dev/null)
            ine=$(echo "$rnoexch" | jq -r --arg t "$t" 'any(.[]?; .symbol==$t)' 2>/dev/null)
            mc=$(echo "$r10000" | jq -r --arg t "$t" '(map(select(.symbol==$t))|.[0].marketCap)//"-"' 2>/dev/null)
            rank=$(echo "$r10000" | jq -r --arg t "$t" '([.[]|.marketCap]|sort|reverse) as $s | (map(select(.symbol==$t))|.[0].marketCap) as $m | if $m==null then "-" else (($s|index($m))+1) end' 2>/dev/null)
            echo "| $t | $i3 | $i10 | $ine | $mc | $rank |" >> "$S"
          done

          echo "" >> "$S"
          prof=$(curl -s --max-time 30 "https://financialmodelingprep.com/stable/profile?symbol=ABBV&apikey=$FMP_API_KEY")
          echo "- ABBV /stable/profile: exchange=\`$(echo "$prof"|jq -r '.[0].exchange//.[0].exchangeShortName//"?"' 2>/dev/null)\` isActivelyTrading=\`$(echo "$prof"|jq -r '.[0].isActivelyTrading//"?"' 2>/dev/null)\` isEtf=\`$(echo "$prof"|jq -r '.[0].isEtf//"?"' 2>/dev/null)\` price=\`$(echo "$prof"|jq -r '.[0].price//"?"' 2>/dev/null)\`" >> "$S"

          echo "=== STDOUT MIRROR ==="
          cat "$S"
