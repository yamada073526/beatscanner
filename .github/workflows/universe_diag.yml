name: Universe Diag v2 (SP500 constituent) — one-shot

# task 5 fix 前検証: union 補強の供給源 /stable/sp500-constituent が screener と違い
# 欠落していないか (ABBV/BX/DG/JBL 等を返すか) を確認。取得後に main から削除する。

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
    steps:
      - name: Setup
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq curl
      - name: Guard FMP_API_KEY
        run: |
          if [ -z "$FMP_API_KEY" ]; then echo "::error::FMP_API_KEY 未設定"; exit 1; fi
      - name: Probe SP500 constituent
        run: |
          set +e
          PROBE="ABBV ABT C BX F CMG DG JBL CTVA CNC CBRE FCX D BABA AAPL MSFT NVDA"
          S="$GITHUB_STEP_SUMMARY"
          sp=$(curl -s --max-time 60 "https://financialmodelingprep.com/stable/sp500-constituent?apikey=$FMP_API_KEY")
          n=$(echo "$sp" | jq 'length' 2>/dev/null)
          echo "## SP500 constituent diag $(date -u +%FT%TZ)" >> "$S"
          echo "- /stable/sp500-constituent count: **$n**" >> "$S"
          echo "- sample keys: \`$(echo "$sp" | jq -r '.[0]|keys|join(",")' 2>/dev/null)\`" >> "$S"
          echo "" >> "$S"
          echo "| ticker | in SP500-constituent |" >> "$S"
          echo "|---|---|" >> "$S"
          for t in $PROBE; do
            inq=$(echo "$sp" | jq -r --arg t "$t" 'any(.[]?; .symbol==$t)' 2>/dev/null)
            echo "| $t | $inq |" >> "$S"
          done
          echo "=== STDOUT MIRROR ==="
          cat "$S"
