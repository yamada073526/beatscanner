name: Generate Daily Articles (v113)

# v113 Phase 2: GitHub Actions cron で Railway endpoint を curl で叩く HTTP trigger pattern。
# 旧 design (Python script + articles/ commit) は v113 で全面廃止、 backend pipeline
# (article_pipeline/) + Supabase articles table に置換。
#
# - 毎朝 19:00 UTC (= 04:00 JST) に day-of-year rotation で 1 銘柄起動 (v115 user feedback)
# - ticker は 5 銘柄ローテーション: NVDA / AAPL / MSFT / GOOGL / AMZN
#   day_of_year (1-366) % 5 で index 計算、 毎日違う銘柄が選ばれる (5 日サイクル)
# - workflow_dispatch で任意 ticker を手動実行可能 (rotation 無視)
# - secret 不要 (公開 endpoint、 demo rate limit 3/day だが本 cron は IP 制限内)
# - 失敗しても workflow は緑にする (continue-on-error) → 早朝アラート疲れ防止
#
# memory anchors:
#   project_pane45_redesign.md (v113 spec Phase 2)
#   feedback_demo_rate_limit_smoke_test.md (response 構造確認 pattern)

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "銘柄ティッカー (default NVDA)"
        required: false
        type: string
        default: "NVDA"
      format:
        description: "deep_dive | theme_horizon | daily_digest"
        required: false
        type: string
        default: "deep_dive"
  schedule:
    - cron: '0 19 * * *'   # 19:00 UTC = 04:00 JST (v115 user feedback、 朝 4 時起床に合わせる)

jobs:
  generate:
    name: Trigger article pipeline (rotation)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: Trigger pipeline
        id: trigger
        continue-on-error: true
        env:
          BASE: https://beatscanner-production.up.railway.app
        run: |
          # v115: workflow_dispatch 入力 > day-of-year rotation
          # rotation 5 銘柄: NVDA / AAPL / MSFT / GOOGL / AMZN (5 日サイクル)
          if [ -n "${{ github.event.inputs.ticker }}" ]; then
            TICKER="${{ github.event.inputs.ticker }}"
          else
            DOY=$(date -u +%j)
            ROTATION=(NVDA AAPL MSFT GOOGL AMZN)
            INDEX=$(( 10#$DOY % ${#ROTATION[@]} ))
            TICKER="${ROTATION[$INDEX]}"
          fi
          FORMAT="${{ github.event.inputs.format || 'deep_dive' }}"
          ENDPOINT="$BASE/api/cron/generate-articles?ticker=$TICKER&format=$FORMAT"
          echo "selected ticker: $TICKER (DOY=$(date -u +%j))"

          mkdir -p reports
          REPORT="reports/article_$(date -u +%Y-%m-%d)_${TICKER}.json"

          # POST + body 省略 (raw_sources 自動 fetch path、 backend sources.py 経由)。
          # router の raw_sources は Body(default=None) で list 期待のため、 `-d '{}'` は
          # FastAPI が object として parse して 422 になる (v114 smoke test で確認済)。
          status=$(curl -fsS -X POST "$ENDPOINT" \
            -H 'Content-Type: application/json' \
            -o "$REPORT" \
            -w '%{http_code}' || echo "000")

          echo "HTTP status: $status"
          echo "selected_ticker=$TICKER" >> "$GITHUB_OUTPUT"
          if [ -f "$REPORT" ]; then
            echo '--- response ---'
            jq . "$REPORT" || cat "$REPORT"
            echo '----------------'
            # final_status 抽出 (passed / regenerate_failed / no_sources / writer_failed)
            final_status=$(jq -r '.final_status // "unknown"' "$REPORT" 2>/dev/null || echo "parse-err")
            echo "final_status=$final_status" >> "$GITHUB_OUTPUT"
            echo "report=$REPORT" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: article-pipeline-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "### Article Pipeline Run ($(date -u +'%Y-%m-%d %H:%M UTC'))" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **ticker**: \`${{ steps.trigger.outputs.selected_ticker || 'auto-rotation' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **final_status**: \`${{ steps.trigger.outputs.final_status }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **report**: \`${{ steps.trigger.outputs.report }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Supabase \`articles\` table に status='draft' で保存 (人間 review 後 status='published')" >> $GITHUB_STEP_SUMMARY
