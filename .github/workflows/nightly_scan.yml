name: Nightly Scan (RS + Cup-Handle)

# v146: 夜間スクリーニング (RS / Cup-with-Handle) を GitHub Actions で確実に実行する。
#
# 背景 (2026-06-01 user dogfood + 診断):
#   - railway.toml [[crons]] の rs-scan / cup-scan が **2026-05-26 以降 発火しておらず** データが stale 化。
#   - 原因は Railway cron scheduler 側 (endpoint は正常: russell3000/1000 を rs=62s / cup=97s で完走確認)。
#   - Railway cron は CLI から状態確認・修復が困難なため、 version 管理できて確実な GitHub Actions に移行。
#   - scans は ~1-2 分で完了するため GH Actions の短時間ジョブに適合 (旧「GHは long-running用」 制約は
#     Railway cron が機能する前提だった。 機能しないので reliability を優先)。
#
# 順序: cup-scan (23:00 相当) → rs-scan (gc データ source) → cup-notify (scan 完了後に digest 配信)。
#   3 本を 1 workflow で直列実行 (合計 ~3 分)。 idempotent upsert なので Railway cron が復活しても無害。
#
# ⚠️ 有効化には GitHub repo secret `CRON_SECRET` (Railway production と同値) が必要:
#     railway variables --json | python3 -c "import sys,json;print(json.load(sys.stdin)['CRON_SECRET'])" | gh secret set CRON_SECRET
#   (未設定だと cron endpoint が 401 を返し scan は実行されない)
#
# memory anchor: feedback_railway_native_cron.md (移行の経緯) / project_signature_tier_10k_strategy.md (push 看板)

on:
  workflow_dispatch:
  schedule:
    # 23:07 UTC = 08:07 JST。 米国市場 close (20-21 UTC) 後、 hourly boundary (:00) の高負荷帯を回避。
    - cron: '7 23 * * *'

jobs:
  scan:
    name: Nightly RS + Cup-Handle + CAN-SLIM scan
    runs-on: ubuntu-latest
    # 6体合議 qa P0: cup(~97s)+rs(~62s)+canslim(wc=3 並列、3000銘柄) を直列実行する余裕。
    # canslim は新規・初回未実測のため 30→45min に margin (timeout で partial scan 化を防ぐ)。
    timeout-minutes: 45
    env:
      BASE: https://beatscanner-production.up.railway.app
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      # v158 3体合議 (sre verdict): universe_size 1000→3000。 1000 は底$9.4B=大型株のみで
      # 小型株 alpha (russell3000 拡張の主目的) 未達。 3000 で底$0.5B・小型株31% (流動性フィルタ後24%)。
      # cron 時間: 3000@worker3 で rs~3.1min/cup~4.8min/GH sequential~8min (timeout 30min 内)。
      # Supabase ~166MB/500MB=33%。 段階展開不要 (Ultimate で rate-limit リスク消失)。
      BODY: '{"universe_source":"russell3000","universe_size":3000,"worker_count":3}'
    steps:
      - name: Setup tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: Guard — CRON_SECRET present
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret 未設定。 README の gh secret set コマンドで追加してください。"
            exit 1
          fi

      - name: Cup-with-Handle scan
        id: cup
        continue-on-error: true
        run: |
          echo "=== cup-scan ==="
          resp=$(curl -s --max-time 1200 -w '\nHTTP:%{http_code}' -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H 'Content-Type: application/json' \
            -d "$BODY" "$BASE/api/cron/cup-scan")
          http=$(echo "$resp" | tail -1 | sed 's/.*HTTP://')
          body=$(echo "$resp" | sed '$d')
          echo "HTTP=$http"
          echo "$body" | jq '{processed_count,detected_count,upserted_count,failed_count}' 2>/dev/null || true
          detected=$(echo "$body" | jq -r '.detected_count // 0' 2>/dev/null || echo 0)
          upserted=$(echo "$body" | jq -r '.upserted_count // 0' 2>/dev/null || echo 0)
          {
            echo "http=$http"
            echo "produced=$detected"
            echo "upserted=$upserted"
          } >> "$GITHUB_OUTPUT"
          # Sprint 0 (SPEC §10 step3 / M8): 502 silent fail を loud に。HTTP 非200 を ::error:: 明示。
          # continue-on-error は維持 (cup の 502 で rs/canslim を止めない)。job 失敗判定は末尾の health gate。
          if [ "$http" != "200" ]; then
            echo "::error::cup-scan が HTTP $http を返した (502=Railway gateway timeout の可能性。3000銘柄同期 scan の構造的 risk)。データ未更新。"
            echo "### 🔴 cup-scan FAILED (HTTP \`$http\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
          # v176: OHLCV fetch 大量失敗の検知 (FMP 移行効果の監視)。 failed が processed の半数超なら warning。
          proc=$(echo "$body" | jq -r '.processed_count // 0' 2>/dev/null || echo 0)
          fail=$(echo "$body" | jq -r '.failed_count // 0' 2>/dev/null || echo 0)
          if [ "${proc:-0}" -gt 0 ] && [ "${fail:-0}" -gt $((proc / 2)) ]; then
            echo "::warning::Cup scan の OHLCV fetch 失敗多数 (failed=$fail / processed=$proc) — FMP fetch を確認。"
          fi

      - name: RS scan
        id: rs
        continue-on-error: true
        run: |
          echo "=== rs-scan ==="
          resp=$(curl -s --max-time 1200 -w '\nHTTP:%{http_code}' -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H 'Content-Type: application/json' \
            -d "$BODY" "$BASE/api/cron/rs-scan")
          http=$(echo "$resp" | tail -1 | sed 's/.*HTTP://')
          body=$(echo "$resp" | sed '$d')
          echo "HTTP=$http"
          echo "$body" | jq '{calc_date,scored_count,upserted_count,failed_count,gc_upserted_count}' 2>/dev/null || true
          scored=$(echo "$body" | jq -r '.scored_count // 0' 2>/dev/null || echo 0)
          upserted=$(echo "$body" | jq -r '.upserted_count // 0' 2>/dev/null || echo 0)
          {
            echo "http=$http"
            echo "produced=$scored"
            echo "upserted=$upserted"
          } >> "$GITHUB_OUTPUT"
          # Sprint 0: HTTP 非200 を ::error:: 明示 (502 silent fail 是正)。
          if [ "$http" != "200" ]; then
            echo "::error::rs-scan が HTTP $http を返した (502 の可能性)。RS データ未更新。"
            echo "### 🔴 rs-scan FAILED (HTTP \`$http\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
          # v176: partial-scan 検知。 2026-06-06 は scored=3 で本番 RS スクリーナーが PANW 1 件のみ
          # = Trust Cliff になった。 read 側 guard で前日 full に fallback するが scan health を明示。
          if [ "${scored:-0}" -lt 500 ]; then
            echo "::warning::RS scan partial (scored_count=$scored < 500) — FMP OHLCV fetch を確認。 read 側は前日 full に fallback 済。"
          fi

      - name: Cup-Handle digest notify
        id: notify
        continue-on-error: true
        run: |
          echo "=== cup-notify ==="
          curl -s --max-time 120 -w '\nHTTP:%{http_code}' -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" "$BASE/api/cron/cup-notify" | tail -5

      # CAN-SLIM Phase 2 Sprint 2: C 条件 (EPS YoY%) nightly scan
      # Phase 3 Sprint 3 拡張: S 条件 (buyback_yield / volume_surge_pct) 追加 + upsert 失敗率 warning
      # gate 1 確定: cup-scan への piggyback なし、独立 cron として追加。
      # cup-scan / rs-scan の後に直列実行 (FMP rate limit の重複を避ける)。
      # feedback_railway_native_cron: Railway native cron は発火停止 → GHA 必須。
      - name: CAN-SLIM C/A/N/S 条件 scan
        id: canslim
        continue-on-error: true
        run: |
          echo "=== canslim-scan ==="
          resp=$(curl -s --max-time 1200 -w '\nHTTP:%{http_code}' -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H 'Content-Type: application/json' \
            -d "$BODY" "$BASE/api/cron/canslim-scan")
          http=$(echo "$resp" | tail -1 | sed 's/.*HTTP://')
          body=$(echo "$resp" | sed '$d')
          echo "HTTP=$http"
          echo "$body" | jq '{processed_count,eps_computed_count,eps_null_count,upserted_count,failed_count,buyback_computed_count,volume_surge_computed_count,calc_date}' 2>/dev/null || true
          # eps_computed_count が processed の 30% 未満なら警告 (EPS data 取得不良の検知)
          proc=$(echo "$body" | jq -r '.processed_count // 0' 2>/dev/null || echo 0)
          eps_ok=$(echo "$body" | jq -r '.eps_computed_count // 0' 2>/dev/null || echo 0)
          cs_upserted=$(echo "$body" | jq -r '.upserted_count // 0' 2>/dev/null || echo 0)
          {
            echo "http=$http"
            echo "produced=$proc"
            echo "upserted=$cs_upserted"
          } >> "$GITHUB_OUTPUT"
          # Sprint 0: HTTP 非200 を ::error:: 明示 (502 silent fail 是正)。
          if [ "$http" != "200" ]; then
            echo "::error::canslim-scan が HTTP $http を返した (502 の可能性)。CAN-SLIM データ未更新。"
            echo "### 🔴 canslim-scan FAILED (HTTP \`$http\`)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${proc:-0}" -gt 0 ] && [ "${eps_ok:-0}" -lt $((proc * 30 / 100)) ]; then
            echo "::warning::CAN-SLIM scan の eps_computed が少ない (computed=$eps_ok / processed=$proc) — FMP earnings_surprises を確認。"
          fi
          # MINOR S4a: upsert 失敗率 warning (GRANT 漏れ silent fail 検知)
          # 分母を eps_computed → processed_count に変更 (S4a 修正)。
          # 旧分母 eps_computed (最大 256 件) だと eps NULL 銘柄の失敗を黙認するため、
          # processed_count (全 scan 対象数) を分母にして実質的な失敗率を計測する。
          upserted=$(echo "$body" | jq -r '.upserted_count // 0' 2>/dev/null || echo 0)
          if [ "${proc:-0}" -gt 0 ] && [ "${upserted:-0}" -lt $((proc / 2)) ]; then
            echo "::warning::CAN-SLIM scan の upsert 失敗率が高い (upserted=$upserted / processed=$proc)。Supabase screener_fundamentals テーブルの service_role GRANT を確認してください (feedback_supabase_grant_bug)。"
            echo "### ⚠️ CAN-SLIM upsert 失敗率警告" >> "$GITHUB_STEP_SUMMARY"
            echo "- upserted: \`$upserted\` / processed: \`$proc\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- 対処: Supabase SQL Editor で \`grant select, insert, update, delete on public.screener_fundamentals to service_role;\` を実行" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Scan health gate (502 / silent persist-fail を job 失敗に — Sprint 0)
        run: |
          # SPEC §10 step3 / M8: continue-on-error で隠れていた scan 失敗を job 失敗に昇格する。
          # 各 scan: HTTP 非200 → fail / produced>0 かつ upserted==0 → silent persist fail → fail。
          # produced==0 (検出ゼロの静かな日) は warning 止まり。breakout 配線時 (Sprint 2) はここに bo_* scan を check で追加する。
          fail=0
          check() {
            name="$1"; http="$2"; produced="$3"; upserted="$4"
            if [ "$http" != "200" ]; then
              echo "::error::$name HTTP=$http — nightly を失敗扱い (502 silent fail 是正)。"; fail=1
            elif [ "${produced:-0}" -gt 0 ] && [ "${upserted:-0}" -eq 0 ]; then
              echo "::error::$name produced=$produced だが upserted=0 — silent persist 失敗 (Supabase GRANT/DB を確認)。"; fail=1
            elif [ "${produced:-0}" -eq 0 ]; then
              echo "::warning::$name produced=0 — 検出ゼロ (静かな日か scan 不調)。"
            fi
            return 0
          }
          check cup-scan "${{ steps.cup.outputs.http }}" "${{ steps.cup.outputs.produced }}" "${{ steps.cup.outputs.upserted }}"
          check rs-scan "${{ steps.rs.outputs.http }}" "${{ steps.rs.outputs.produced }}" "${{ steps.rs.outputs.upserted }}"
          check canslim-scan "${{ steps.canslim.outputs.http }}" "${{ steps.canslim.outputs.produced }}" "${{ steps.canslim.outputs.upserted }}"
          if [ "$fail" -ne 0 ]; then
            echo "### 🔴 Scan health gate FAILED — 上記 scan が silent fail (502/persist)。継続するなら universe 分割 or scan 非同期化 (SPEC §4.5/⑩)。" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ scan health OK (全 scan HTTP200 + persist 確認)"

      - name: Verify freshness
        run: |
          echo "### Nightly Scan ($(date -u +'%Y-%m-%d %H:%M UTC'))" >> "$GITHUB_STEP_SUMMARY"
          rs_date=$(curl -s --max-time 20 "$BASE/api/scanner/rs?min_percentile=80&limit=1" | jq -r '.calc_date // "?"')
          cup_total=$(curl -s --max-time 20 "$BASE/api/scanner/cup-handle?filter=cup" | jq -r '.total_count // 0')
          today=$(date -u +%Y-%m-%d)
          echo "- RS calc_date: \`$rs_date\` (today: \`$today\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cup-Handle total: \`$cup_total\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "$rs_date" != "$today" ]; then
            echo "::warning::RS calc_date ($rs_date) != today ($today) — scan が反映されていない可能性"
          fi
