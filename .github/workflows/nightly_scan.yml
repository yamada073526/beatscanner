name: Nightly Scan (RS + Cup-Handle)

# v146: 夜間スクリーニング (RS / Cup-with-Handle) を GitHub Actions で確実に実行する。
#
# 背景 (2026-06-01 user dogfood + 診断):
#   - railway.toml [[crons]] の rs-scan / cup-scan が **2026-05-26 以降 発火しておらず** データが stale 化。
#   - 原因は Railway cron scheduler 側 (endpoint は正常: russell3000/1000 を rs=62s / cup=97s で完走確認)。
#   - Railway cron は CLI から状態確認・修復が困難なため、 version 管理できて確実な GitHub Actions に移行。
#   - scans は ~1-2 分で完了するため GH Actions の短時間ジョブに適合 (旧「GHは long-running用」 制約は
#     Railway cron が機能する前提だった。 機能しないので reliability を優先)。
#
# 順序: cup-scan (23:00 相当) → rs-scan (gc データ source) → cup-notify (scan 完了後に digest 配信)。
#   3 本を 1 workflow で直列実行 (合計 ~3 分)。 idempotent upsert なので Railway cron が復活しても無害。
#
# ⚠️ 有効化には GitHub repo secret `CRON_SECRET` (Railway production と同値) が必要:
#     railway variables --json | python3 -c "import sys,json;print(json.load(sys.stdin)['CRON_SECRET'])" | gh secret set CRON_SECRET
#   (未設定だと cron endpoint が 401 を返し scan は実行されない)
#
# memory anchor: feedback_railway_native_cron.md (移行の経緯) / project_signature_tier_10k_strategy.md (push 看板)

on:
  workflow_dispatch:
    # 手動起動時のみ有効な検証用 input (schedule では空 → default 維持で nightly 無影響)。
    # backend sprint の deploy 後検証で使う: 小 universe + canslim-only で gateway 502 を回避し
    # 5min 以内に 200 応答 (upserted/各 computed_count) を取得する (per-ticker 計算のみで小 universe 安全)。
    inputs:
      universe_size:
        description: 'universe_size (検証は 80 等の小値。default 3000 = 通常 nightly)'
        required: false
        default: '3000'
      canslim_only:
        description: 'true で cup/rs/notify をスキップし canslim-scan のみ実行 (RS percentile 汚染を防ぐ)'
        required: false
        default: 'false'
  schedule:
    # 23:07 UTC = 08:07 JST。 米国市場 close (20-21 UTC) 後、 hourly boundary (:00) の高負荷帯を回避。
    - cron: '7 23 * * *'

jobs:
  scan:
    name: Nightly RS + Cup-Handle + CAN-SLIM scan
    runs-on: ubuntu-latest
    # 6体合議 qa P0: cup(~97s)+rs(~62s)+canslim を直列実行する余裕。
    # issue #27: cup/canslim/earnings-annual を offset chunk loop 化 (各 endpoint 12 chunk)。
    # 直列 chunk で wall time が伸びる (canslim ~40min + earnings ~18min + cup/rs ~8min ≈ 65min) ため
    # 45→90min に margin。実測 (run 28230519656/28231193357): canslim 500/worker3 は 5min で 502、
    # 300/worker5 は 4:01 で 200 (throughput ~1.24 t/s)。chunk-0 の 3000 universe fetch 分も見て CHUNK=250。
    # SPEC 2026-07-01: warmup step (+~数秒-5min) + canslim chunk retry (上限1・最悪 +10min/chunk) の
    # wall-time 増を見て 90→120min。病的ケース (warmup 失敗 + 複数 chunk retry) でも末尾 Freshness gate
    # (mega-cap 検知) まで到達させる margin (6 体 ship 前 gate SRE/GHA verdict)。
    timeout-minutes: 120
    env:
      BASE: https://beatscanner-production.up.railway.app
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      # v158 3体合議 (sre verdict): universe_size 1000→3000。 1000 は底$9.4B=大型株のみで
      # 小型株 alpha (russell3000 拡張の主目的) 未達。 3000 で底$0.5B・小型株31% (流動性フィルタ後24%)。
      # Supabase ~166MB/500MB=33%。 段階展開不要 (Ultimate で rate-limit リスク消失)。
      # issue #27: worker_count 3→5 (canslim/cup throughput↑、cap5)、concurrency 12 追加
      # (earnings-annual 並列度↑、cup/canslim は無視し worker_count を使用)。直列実行のため FMP 同時負荷は
      # 1 endpoint 分のみ = Ultimate 750req/min 内。
      BODY: '{"universe_source":"russell3000","universe_size":${{ inputs.universe_size || 3000 }},"worker_count":5,"concurrency":12}'
      # issue #27: full universe (3000) を 1 回の同期 HTTP で投げると Railway gateway の 5min 502 で
      # persist 前に切られ 0 persist になる。CHUNK 単位 (offset/limit) でループ呼出し各 chunk を 5min 内に
      # 完走・200 応答させる (per-ticker 独立な cup/canslim/earnings-annual のみ chunk 化、rs は percentile
      # が cross-ticker のため単発維持)。実測: 500銘柄/worker3 は canslim が 5min 502 (run 28230519656)、
      # 300銘柄/worker5 は 4:01 で 200・300/300 persist (run 28231193357)。最重 endpoint canslim の
      # throughput ~1.24 t/s + chunk-0 の 3000 universe fetch (cache miss) の上乗せを見て CHUNK=250
      # (250銘柄 ≈ 3:20、chunk-0 でも 5min 内、3000/250 = 12 chunk)。検証 universe_size=80 等の小値は 1 chunk。
      CHUNK: '250'
    steps:
      - name: Setup tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - name: Guard — CRON_SECRET present
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret 未設定。 README の gh secret set コマンドで追加してください。"
            exit 1
          fi

      # SPEC 2026-07-01: chunk-0 (top-250 mega-cap) coverage fix。
      # cup/canslim/earnings-annual の chunk 0 (offset=0) が _fetch_market_cap_top_n の cache miss を
      # per-ticker 処理と同じ 5min gateway 窓で背負い 502 → mega-cap 全カラムが nightly で欠落していた。
      # 最初の重い consumer (cup-scan) の前に universe cache を prime し全 chunk を cache hit にする。
      # warmup は per-ticker を持たず universe fetch のみ = 数秒想定。502 でも job は落とさない
      # (後続 chunk 0 が cache miss を吸収する graceful 設計)。elapsed_sec で warmup 単独 wall-time を監視。
      - name: Universe cache warmup (chunk-0 502 fix)
        continue-on-error: true
        run: |
          echo "=== universe cache warmup ==="
          resp=$(curl -s --max-time 300 -w '\nHTTP:%{http_code}\nTIME:%{time_total}' -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H 'Content-Type: application/json' \
            -d "$BODY" "$BASE/api/cron/canslim-warmup")
          http=$(echo "$resp" | grep '^HTTP:' | sed 's/HTTP://')
          ttime=$(echo "$resp" | grep '^TIME:' | sed 's/TIME://')
          jbody=$(echo "$resp" | sed '/^HTTP:/d; /^TIME:/d')
          primed=$(echo "$jbody" | jq -r '.primed_count // 0' 2>/dev/null || echo 0)
          elapsed=$(echo "$jbody" | jq -r '.elapsed_sec // 0' 2>/dev/null || echo 0)
          echo "  [warmup] http=$http primed=$primed elapsed_sec=$elapsed curl_time=${ttime}s"
          echo "### universe warmup: http=\`$http\` primed=\`$primed\` elapsed=\`${elapsed}s\` (curl ${ttime}s)" >> "$GITHUB_STEP_SUMMARY"
          if [ "$http" != "200" ]; then
            echo "::warning::universe warmup が HTTP $http。chunk 0 が cache miss を背負う可能性 (後続 freshness gate で mega-cap 欠落を検知)。"
          fi

      - name: Cup-with-Handle scan
        id: cup
        if: ${{ inputs.canslim_only != 'true' }}
        continue-on-error: true
        run: |
          # issue #27: offset chunk loop。full universe を CHUNK 件ずつ分割呼出し、各 chunk を
          # Railway gateway 5min 内に完走・200 応答させる (cup-scan は per-ticker 独立で chunk 安全)。
          echo "=== cup-scan (chunked offset loop) ==="
          UNIVERSE=$(echo "$BODY" | jq -r '.universe_size // 3000')
          t_proc=0; t_det=0; t_ups=0; t_fail=0; offset=0; last_http=000
          while [ "$offset" -lt "$UNIVERSE" ]; do
            cbody=$(echo "$BODY" | jq -c --argjson off "$offset" --argjson lim "$CHUNK" '. + {offset:$off, limit:$lim}')
            resp=$(curl -s --max-time 600 -w '\nHTTP:%{http_code}' -X POST \
              -H "X-Cron-Secret: $CRON_SECRET" -H 'Content-Type: application/json' \
              -d "$cbody" "$BASE/api/cron/cup-scan")
            http=$(echo "$resp" | tail -1 | sed 's/.*HTTP://')
            body=$(echo "$resp" | sed '$d')
            proc=$(echo "$body" | jq -r '.processed_count // 0' 2>/dev/null || echo 0)
            det=$(echo "$body" | jq -r '.detected_count // 0' 2>/dev/null || echo 0)
            ups=$(echo "$body" | jq -r '.upserted_count // 0' 2>/dev/null || echo 0)
            fail=$(echo "$body" | jq -r '.failed_count // 0' 2>/dev/null || echo 0)
            echo "  [cup] offset=$offset/$UNIVERSE http=$http processed=$proc detected=$det upserted=$ups failed=$fail"
            # 各 chunk は 5min 内完走を狙うが、稀に gateway 502 でも次 chunk へ継続 (per-ticker 増分 persist)。
            if [ "$http" != "200" ]; then
              echo "::warning::cup-scan chunk offset=$offset が HTTP $http (gateway timeout の可能性。Freshness gate で DB を真とする)。"
              echo "### ⚠️ cup-scan chunk offset=\`$offset\` HTTP \`$http\`" >> "$GITHUB_STEP_SUMMARY"
            fi
            t_proc=$((t_proc + proc)); t_det=$((t_det + det)); t_ups=$((t_ups + ups)); t_fail=$((t_fail + fail))
            last_http=$http; offset=$((offset + CHUNK))
          done
          echo "cup-scan total: processed=$t_proc detected=$t_det upserted=$t_ups failed=$t_fail"
          {
            echo "http=$last_http"
            echo "processed=$t_proc"
            echo "produced=$t_det"
            echo "upserted=$t_ups"
          } >> "$GITHUB_OUTPUT"
          # v176: OHLCV fetch 大量失敗の検知 (FMP 移行効果の監視)。 failed が processed の半数超なら warning。
          if [ "${t_proc:-0}" -gt 0 ] && [ "${t_fail:-0}" -gt $((t_proc / 2)) ]; then
            echo "::warning::Cup scan の OHLCV fetch 失敗多数 (failed=$t_fail / processed=$t_proc) — FMP fetch を確認。"
          fi

      - name: RS scan
        id: rs
        if: ${{ inputs.canslim_only != 'true' }}
        continue-on-error: true
        run: |
          echo "=== rs-scan ==="
          resp=$(curl -s --max-time 1200 -w '\nHTTP:%{http_code}' -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H 'Content-Type: application/json' \
            -d "$BODY" "$BASE/api/cron/rs-scan")
          http=$(echo "$resp" | tail -1 | sed 's/.*HTTP://')
          body=$(echo "$resp" | sed '$d')
          echo "HTTP=$http"
          echo "$body" | jq '{calc_date,scored_count,upserted_count,failed_count,gc_upserted_count}' 2>/dev/null || true
          scored=$(echo "$body" | jq -r '.scored_count // 0' 2>/dev/null || echo 0)
          upserted=$(echo "$body" | jq -r '.upserted_count // 0' 2>/dev/null || echo 0)
          {
            echo "http=$http"
            echo "produced=$scored"
            echo "upserted=$upserted"
          } >> "$GITHUB_OUTPUT"
          # Sprint 0: HTTP 502 は gateway timeout (backend は persist することが多い)。warning 止まり、判定は末尾 Freshness gate。
          if [ "$http" != "200" ]; then
            echo "::warning::rs-scan が HTTP $http (gateway timeout の可能性。Freshness gate で DB を真とする)。"
            echo "### ⚠️ rs-scan HTTP \`$http\` (gateway timeout、freshness で確認)" >> "$GITHUB_STEP_SUMMARY"
          fi
          # v176: partial-scan 検知。 2026-06-06 は scored=3 で本番 RS スクリーナーが PANW 1 件のみ
          # = Trust Cliff になった。 read 側 guard で前日 full に fallback するが scan health を明示。
          if [ "${scored:-0}" -lt 500 ]; then
            echo "::warning::RS scan partial (scored_count=$scored < 500) — FMP OHLCV fetch を確認。 read 側は前日 full に fallback 済。"
          fi

      - name: Cup-Handle digest notify
        id: notify
        if: ${{ inputs.canslim_only != 'true' }}
        continue-on-error: true
        run: |
          echo "=== cup-notify ==="
          curl -s --max-time 120 -w '\nHTTP:%{http_code}' -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" "$BASE/api/cron/cup-notify" | tail -5

      # CAN-SLIM Phase 2 Sprint 2: C 条件 (EPS YoY%) nightly scan
      # Phase 3 Sprint 3 拡張: S 条件 (buyback_yield / volume_surge_pct) 追加 + upsert 失敗率 warning
      # gate 1 確定: cup-scan への piggyback なし、独立 cron として追加。
      # cup-scan / rs-scan の後に直列実行 (FMP rate limit の重複を避ける)。
      # feedback_railway_native_cron: Railway native cron は発火停止 → GHA 必須。
      - name: CAN-SLIM C/A/N/S 条件 scan
        id: canslim
        continue-on-error: true
        run: |
          # issue #27: offset chunk loop。full universe を CHUNK 件ずつ分割呼出し、各 chunk を 5min 内に
          # 完走・persist させる (canslim-scan は per-ticker 独立で chunk 安全)。full 3000 単発は universe
          # fetch + batch pre-fetch で 5min を食い潰し per-ticker upsert に到達せず 0 persist になっていた。
          echo "=== canslim-scan (chunked offset loop) ==="
          UNIVERSE=$(echo "$BODY" | jq -r '.universe_size // 3000')
          t_proc=0; t_eps=0; t_ups=0; offset=0; last_http=000
          while [ "$offset" -lt "$UNIVERSE" ]; do
            cbody=$(echo "$BODY" | jq -c --argjson off "$offset" --argjson lim "$CHUNK" '. + {offset:$off, limit:$lim}')
            # SPEC 2026-07-01: chunk (特に chunk 0) が 502 or processed=0 のとき最大 1 回 retry。
            # retry の「最終結果だけ」を total に加算 (二重加算回避)。retry 常時発火 = warmup/根治が
            # 効いていない検知信号 (::warning::)。per-ticker upsert は idempotent のため再試行は安全。
            attempt=1; max_attempts=2; http=000; proc=0; eps_ok=0; ups=0
            while [ "$attempt" -le "$max_attempts" ]; do
              resp=$(curl -s --max-time 600 -w '\nHTTP:%{http_code}' -X POST \
                -H "X-Cron-Secret: $CRON_SECRET" -H 'Content-Type: application/json' \
                -d "$cbody" "$BASE/api/cron/canslim-scan")
              http=$(echo "$resp" | tail -1 | sed 's/.*HTTP://')
              body=$(echo "$resp" | sed '$d')
              proc=$(echo "$body" | jq -r '.processed_count // 0' 2>/dev/null || echo 0)
              eps_ok=$(echo "$body" | jq -r '.eps_computed_count // 0' 2>/dev/null || echo 0)
              ups=$(echo "$body" | jq -r '.upserted_count // 0' 2>/dev/null || echo 0)
              if [ "$http" = "200" ] && [ "$proc" -gt 0 ]; then break; fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo "::warning::canslim-scan chunk offset=$offset attempt=$attempt 失敗 (http=$http processed=$proc) — retry (chunk-0 fix の保険; 常時発火なら warmup/根治が効いていない信号)。"
                sleep $((attempt * 5))
              fi
              attempt=$((attempt + 1))
            done
            echo "  [canslim] offset=$offset/$UNIVERSE http=$http processed=$proc eps_computed=$eps_ok upserted=$ups"
            if [ "$http" != "200" ]; then
              echo "::warning::canslim-scan chunk offset=$offset が HTTP $http (retry 後も。Freshness gate で DB を真とする)。"
              echo "### ⚠️ canslim-scan chunk offset=\`$offset\` HTTP \`$http\` (retry 後)" >> "$GITHUB_STEP_SUMMARY"
            fi
            t_proc=$((t_proc + proc)); t_eps=$((t_eps + eps_ok)); t_ups=$((t_ups + ups))
            last_http=$http; offset=$((offset + CHUNK))
          done
          echo "canslim-scan total: processed=$t_proc eps_computed=$t_eps upserted=$t_ups"
          {
            echo "http=$last_http"
            echo "produced=$t_proc"
            echo "upserted=$t_ups"
          } >> "$GITHUB_OUTPUT"
          # eps_computed_count が processed の 30% 未満なら警告 (EPS data 取得不良の検知)
          if [ "${t_proc:-0}" -gt 0 ] && [ "${t_eps:-0}" -lt $((t_proc * 30 / 100)) ]; then
            echo "::warning::CAN-SLIM scan の eps_computed が少ない (computed=$t_eps / processed=$t_proc) — FMP earnings_surprises を確認。"
          fi
          # MINOR S4a: upsert 失敗率 warning (GRANT 漏れ silent fail 検知)。分母は processed_count (全 scan 対象)。
          if [ "${t_proc:-0}" -gt 0 ] && [ "${t_ups:-0}" -lt $((t_proc / 2)) ]; then
            echo "::warning::CAN-SLIM scan の upsert 失敗率が高い (upserted=$t_ups / processed=$t_proc)。Supabase screener_fundamentals テーブルの service_role GRANT を確認してください (feedback_supabase_grant_bug)。"
            echo "### ⚠️ CAN-SLIM upsert 失敗率警告" >> "$GITHUB_STEP_SUMMARY"
            echo "- upserted: \`$t_ups\` / processed: \`$t_proc\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- 対処: Supabase SQL Editor で \`grant select, insert, update, delete on public.screener_fundamentals to service_role;\` を実行" >> "$GITHUB_STEP_SUMMARY"
          fi

      # じっちゃま 5 条件 funda_pass: 年次 (Annual) 3 年連続増加 scan (handover v255)
      # root cause 是正: cond2/3/4 が四半期 QoQ 単調増加を要求 → 季節性で優良大型株が全滅し True=0。
      #   原典は「年間データで 3 年連続増加」 (FY[t-2]<FY[t-1]<FY[t])。 earnings_annual_evaluation を更新。
      # 停止原因 是正: funda_pass は手動 /api/admin/refresh-earnings-history のみで cron 未登録だったため
      #   2026-05-15 で停止していた。 本 step で nightly 自動更新を回復し freshness を常時新鮮に保つ。
      # canslim-scan の直後に直列実行 (FMP rate limit の重複を避ける)。
      - name: Earnings annual (funda_pass) scan
        id: earnings_annual
        continue-on-error: true
        run: |
          # issue #27: offset chunk loop (canslim と同設計)。earnings-annual は per-ticker 独立で chunk 安全。
          echo "=== earnings-annual-scan (chunked offset loop) ==="
          UNIVERSE=$(echo "$BODY" | jq -r '.universe_size // 3000')
          t_proc=0; t_eval=0; offset=0; last_http=000
          while [ "$offset" -lt "$UNIVERSE" ]; do
            cbody=$(echo "$BODY" | jq -c --argjson off "$offset" --argjson lim "$CHUNK" '. + {offset:$off, limit:$lim}')
            resp=$(curl -s --max-time 600 -w '\nHTTP:%{http_code}' -X POST \
              -H "X-Cron-Secret: $CRON_SECRET" -H 'Content-Type: application/json' \
              -d "$cbody" "$BASE/api/cron/earnings-annual-scan")
            http=$(echo "$resp" | tail -1 | sed 's/.*HTTP://')
            body=$(echo "$resp" | sed '$d')
            proc=$(echo "$body" | jq -r '.processed_count // 0' 2>/dev/null || echo 0)
            evaluated=$(echo "$body" | jq -r '.evaluated_count // 0' 2>/dev/null || echo 0)
            echo "  [earnings-annual] offset=$offset/$UNIVERSE http=$http processed=$proc evaluated=$evaluated"
            if [ "$http" != "200" ]; then
              echo "::warning::earnings-annual-scan chunk offset=$offset が HTTP $http (gateway timeout の可能性。Freshness gate で DB を真とする)。"
              echo "### ⚠️ earnings-annual-scan chunk offset=\`$offset\` HTTP \`$http\`" >> "$GITHUB_STEP_SUMMARY"
            fi
            t_proc=$((t_proc + proc)); t_eval=$((t_eval + evaluated))
            last_http=$http; offset=$((offset + CHUNK))
          done
          echo "earnings-annual-scan total: processed=$t_proc evaluated=$t_eval"
          # upsert 失敗検知 (GRANT 漏れ silent fail): processed>0 だが evaluated=0 は異常。
          if [ "${t_proc:-0}" -gt 0 ] && [ "${t_eval:-0}" -eq 0 ]; then
            echo "::warning::earnings-annual-scan の評価が 0 件 (processed=$t_proc, evaluated=0)。earnings_annual / earnings_annual_evaluation の service_role GRANT を確認 (feedback_supabase_grant_bug)。"
            echo "### ⚠️ earnings-annual evaluated=0 警告 (GRANT 漏れの可能性)" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Freshness gate (DB を真とする — 502 でなく stale を job 失敗に — Sprint 0)
        run: |
          set +e  # curl/jq の非ゼロで step を落とさない。判定は fail 変数 + 明示 exit。
          # Sprint 0 検証(2026-06-16)で判明: Railway gateway は ~5min で 502 を返すが backend scan は完走し
          # persist する (502 ≠ stale)。HTTP status は健全性信号にならないため read endpoint の DB date を真とする。
          # date が scan-date か market-date か曖昧なため「>= 前日」で判定 (1日 lag 許容・2日以上古ければ真の stale)。
          # gateway 脆弱性(502)の構造解消は SPEC §4.5/⑩ の async/chunk 化(将来の本丸)。
          # breakout 配線時 (Sprint 2) は /api/scanner/breakout の as_of チェックを chk で1行追加する。
          today=$(date -u +%Y-%m-%d)
          yday=$(date -u -d 'yesterday' +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d 2>/dev/null)
          echo "### Nightly Scan freshness (today $today / 許容下限 $yday)" >> "$GITHUB_STEP_SUMMARY"
          fail=0
          chk() {  # $1 name / $2 url / $3 jq path
            d=$(curl -s --max-time 20 "$2" | jq -r "$3 // \"null\"" 2>/dev/null)
            echo "- $1: \`$d\`" >> "$GITHUB_STEP_SUMMARY"
            if [ "$d" = "null" ] || [[ "$d" < "$yday" ]]; then
              echo "::error::$1 stale (date=$d < $yday) — 2日以上更新なし。"; fail=1
            fi
          }
          # CAN-SLIM は canslim_only / 通常 nightly の両モードで走るため常に判定。
          chk "CAN-SLIM as_of"                        "$BASE/api/scanner/canslim?limit=1"              ".as_of"
          # SPEC 2026-07-01: chunk-0 (top-250 mega-cap) coverage の hard-fail 検知。
          # 既存 as_of chk は全体の MAX(calc_date) を見るため chunk 0 だけ欠落しても PASS する盲点がある
          # (chunk 1-10 が成功すれば as_of は新鮮)。canonical mega-cap の cfps_eps_ratio non-null を直接見て
          # chunk-0 到達を検証する。read endpoint 非対称 (universe に per-ticker calc_date 無し) のため
          # 「値の存在」を chunk-0 success path 到達の代理指標とする (6 体 review GHA 実 curl 確定)。
          # 6 銘柄中 過半数 (>=4) が null なら chunk-0 欠落で hard-fail。少数欠損 (1-3、FMP 個別欠損 /
          # ticker 変更) は warning 止まり (false-positive 抑制、SRE/金融 verdict)。
          mega_json=$(curl -s --max-time 30 "$BASE/api/scanner/universe?universe_size=3000")
          mega_null=0; mega_tot=0; mega_pairs=""
          echo "#### chunk-0 mega-cap cfps coverage (SPEC 2026-07-01)" >> "$GITHUB_STEP_SUMMARY"
          echo "| ticker | cfps_eps_ratio |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          # SPEC §9.8 follow-up: Alphabet は GOOGL(class A)/GOOG(class C) の両建てで、universe payload が
          # どちらの ticker で載るかに依存する。GOOGL は両 ticker を許容し、いずれかが non-null なら
          # その値を採る (片側が載っていれば chunk-0 到達の代理指標として有効。両方欠落時のみ null)。
          for t in AAPL MSFT NVDA GOOGL AMZN META; do
            if [ "$t" = "GOOGL" ]; then
              v=$(echo "$mega_json" | jq -r '[.items[]|select(.ticker=="GOOGL" or .ticker=="GOOG")|.cfps_eps_ratio|select(.!=null)][0] // "null"' 2>/dev/null)
            else
              v=$(echo "$mega_json" | jq -r --arg t "$t" '.items[]|select(.ticker==$t)|.cfps_eps_ratio // "null"' 2>/dev/null)
            fi
            [ -z "$v" ] && v="null"
            echo "| $t | \`$v\` |" >> "$GITHUB_STEP_SUMMARY"
            mega_tot=$((mega_tot + 1))
            mega_pairs+="${t}=${v}"$'\n'
            if [ "$v" = "null" ]; then mega_null=$((mega_null + 1)); fi
          done
          echo "- mega-cap cfps null: \`$mega_null / $mega_tot\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "$mega_null" -ge 4 ]; then
            echo "::error::chunk-0 mega-cap coverage 欠落 ($mega_null/$mega_tot が cfps_eps_ratio=null) — canslim chunk 0 (top-250 mega-cap) が nightly で未処理の疑い。warmup/chunk-0 を調査 (SPEC 2026-07-01)。"; fail=1
          elif [ "$mega_null" -ge 1 ]; then
            echo "::warning::mega-cap の一部で cfps_eps_ratio=null ($mega_null/$mega_tot) — 単一銘柄の FMP 個別欠損 / ticker 変更の可能性 (job は落とさない)。"
          fi
          # handover v309 backlog (2026-07-01, user 承認): 上記判定は毎晩捨てられ GITHUB_STEP_SUMMARY にしか
          # 残らず「hard-fail (mega_null>=4) しない緩やかな劣化」を後から追えなかった。既に計算済みの
          # mega_null/mega_tot/銘柄別詳細を megacap-coverage-snapshot へ POST し履歴化するだけの追加
          # (universe fetch/cfps 再計算なし)。best-effort: 失敗しても $fail は変えない (freshness gate 本体の
          # 判定 = 上の if/elif に一切影響させない)。
          details_json=$(printf '%s' "$mega_pairs" | jq -R -s '
            split("\n") | map(select(length>0)) | map(split("=")) |
            map({(.[0]): (if .[1]=="null" then null else (.[1]|tonumber) end)}) | add // {}
          ' 2>/dev/null || echo '{}')
          snap_http=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 -X POST \
            -H "X-Cron-Secret: $CRON_SECRET" -H "Content-Type: application/json" \
            -d "{\"run_date\":\"$today\",\"universe_size\":3000,\"details\":$details_json}" \
            "$BASE/api/cron/megacap-coverage-snapshot")
          if [ "$snap_http" != "200" ]; then
            echo "::warning::megacap-coverage-snapshot HTTP $snap_http (履歴保存のみ失敗、freshness gate 本体には影響なし)。"
          fi
          echo "- coverage history snapshot: \`http=$snap_http\`" >> "$GITHUB_STEP_SUMMARY"
          # issue #27: canslim_only=true (deploy 後 smoke) は cup/rs/notify を skip するため、それらの
          # freshness は判定しない (skip した scan の stale で smoke を偽 fail させない)。通常 nightly のみ全 check。
          CANSLIM_ONLY="${{ inputs.canslim_only }}"
          if [ "$CANSLIM_ONLY" != "true" ]; then
            chk "RS calc_date"                          "$BASE/api/scanner/rs?min_percentile=80&limit=1" ".calc_date"
            # issue #27: cup-scan の鮮度は「本 run の step 実績 (processed/upserted)」を真とする。
            # 旧実装は /api/scanner/retest の signal_as_of を hard-fail に使っていたが、これは
            # signal_date (= パターン形成日 + read 側 state フィルタ) で「scan がいつ走ったか」を表さない。
            # 実証 (full run 28238147289): cup-scan は本日 12:37 に cup_handle 481 行を persist 済
            # (DB の max scanned_at/signal_date とも 2026-06-26) なのに retest read は signal_as_of=2026-06-22 を
            # 返し、persist 成功にもかかわらず false-fail した。chunk 化で各 chunk が 200 を返し step が
            # 正確な集計を持つようになったため、step 実績を鮮度の真とする。
            cup_http="${{ steps.cup.outputs.http }}"
            cup_proc="${{ steps.cup.outputs.processed }}"
            cup_prod="${{ steps.cup.outputs.produced }}"
            cup_ups="${{ steps.cup.outputs.upserted }}"
            echo "- cup-scan (本 run 実績): processed=\`${cup_proc:-0}\` detected=\`${cup_prod:-0}\` upserted=\`${cup_ups:-0}\`" >> "$GITHUB_STEP_SUMMARY"
            if [ "${cup_proc:-0}" -le 0 ]; then
              echo "::error::cup-scan が universe を処理していない (processed=0) — cup-scan 未実行/全 chunk 失敗の疑い。"; fail=1
            elif [ "${cup_ups:-0}" -le 0 ]; then
              echo "::error::cup-scan processed=$cup_proc だが upserted=0 — persist 失敗 (GRANT/DB)。"; fail=1
            fi
            # 以下は参考表示のみ (hard-fail させない)。retest signal_as_of / cup-handle read total は
            # read 側の signal_date + state フィルタで 0/過去日になりうるため鮮度判定に使わない (上記 step 実績が真)。
            retest_asof=$(curl -s --max-time 20 "$BASE/api/scanner/retest?limit=1" | jq -r '.signal_as_of // "null"' 2>/dev/null)
            echo "- retest signal_as_of (参考・signal_date、鮮度判定外): \`$retest_asof\`" >> "$GITHUB_STEP_SUMMARY"
            cup_total=$(curl -s --max-time 20 "$BASE/api/scanner/cup-handle?filter=cup" | jq -r '.total_count // 0' 2>/dev/null)
            echo "- cup-handle read total (参考): \`$cup_total\`" >> "$GITHUB_STEP_SUMMARY"
            # breakout (Sprint 5): 0件は正常な日次結果 (ブレイク銘柄ゼロの日もある) のため hard-fail させず
            # warning-only。as_of は raw breakout 保存日 = nightly 配線健全性の proxy。null/古い時は warn 止まり。
            bo_asof=$(curl -s --max-time 20 "$BASE/api/scanner/breakout?limit=1" | jq -r '.as_of // "null"' 2>/dev/null)
            echo "- breakout as_of: \`$bo_asof\`" >> "$GITHUB_STEP_SUMMARY"
            if [ "$bo_asof" = "null" ] || [[ "$bo_asof" < "$yday" ]]; then
              echo "::warning::breakout as_of stale/null (date=$bo_asof) — 当夜0件 or nightly 配線未走の可能性 (0件は正常なため job は落とさない)。"
            fi
          fi
          if [ "$fail" -ne 0 ]; then
            # issue #27: chunk/offset 化済。それでも stale なら gateway 502 以外の原因 (FMP rate limit /
            # Supabase service_role GRANT / universe fetch 失敗 / chunk timeout)。各 scan step の
            # chunk ごと http/upserted ログを確認すること。
            echo "### 🔴 Freshness gate FAILED — DB が 2日以上 stale。chunk 化済のため gateway 502 以外の原因 (FMP / GRANT / universe fetch) を上の chunk ログで調査 (issue #27)。" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ freshness OK (rs/canslim の as_of >= $yday、cup-scan は本 run の step 実績 processed/upserted>0 で persist 確認)"

      # issue #27 DoD: 再発検知通知。Freshness gate が exit 1 (DB 2日以上 stale) した時のみ発火。
      # 各 scan step は continue-on-error: true で job を落とさないため、failure() = freshness gate 失敗。
      # GitHub Actions の job failure は actor / watcher へ email 通知される。ここでは失敗内容を step summary
      # に集約し、chunk 化後も回復しない (= gateway 502 以外の根本原因) ことを明示して調査導線を残す。
      - name: Notify on stale (freshness gate failure)
        if: failure()
        run: |
          echo "::error::Nightly Scan freshness gate FAILED — screener が 2日以上 stale。chunk/offset 化後も stale = gateway 502 以外の原因を調査 (issue #27)。"
          {
            echo "## 🔴 Nightly Scan stale 再発 (issue #27)"
            echo "Freshness gate が DB の stale を検知しました。chunk/offset 化後も stale ということは、"
            echo "gateway 502 以外の原因 (FMP rate limit / Supabase service_role GRANT / universe fetch 失敗 / chunk timeout) が疑われます。"
            echo ""
            echo "**調査導線**:"
            echo "- 上の各 scan step の chunk ごと \`http\` / \`upserted\` ログを確認 (どの offset で失敗したか)"
            echo "- Supabase \`screener_fundamentals\` の最新 calc_date 行数を確認 (0 件なら全 chunk persist 失敗)"
            echo "- FMP rate limit (429 / Limit Reach) が出ていないか各 chunk の failed_count を確認"
          } >> "$GITHUB_STEP_SUMMARY"
