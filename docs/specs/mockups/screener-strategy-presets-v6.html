<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BeatScanner スクリーナー戦略プリセット モックアップ v5</title>
<style>
  :root{
    --bg-primary:#0f172a; --bg-card:#1e2433; --bg-subtle:#1e2a3a; --bg-muted:#243447; --bg-hover:#253045;
    --text-primary:#f1f5f9; --text-secondary:#cbd5e1; --text-muted:#94a3b8;
    --color-gain:#34ef81; --color-loss:#f87171; --color-warning:#f59e0b; --color-accent:#38bdf8;
    --gold:#d4af37; --gold-mid:#f4cd5d; --gold-dark:#c8952c;
    --border:rgba(255,255,255,.08); --border-strong:rgba(255,255,255,.14);
    --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:20px;--s6:24px;--s8:32px;
    --r-sm:8px;--r-md:12px;--r-lg:16px;--r-pill:9999px;
    --elev3:0 4px 12px rgba(0,0,0,.50),0 12px 24px rgba(0,0,0,.30);
    --ease-expo:cubic-bezier(.16,1,.3,1); --ease-std:cubic-bezier(.4,0,.2,1); --ease-spring:cubic-bezier(.34,1.56,.64,1);
    --font:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  button{font-family:inherit;color:inherit}
  body{background:radial-gradient(1200px 600px at 80% -10%,rgba(56,189,248,.05),transparent 60%),var(--bg-primary);
    color:var(--text-primary);font-family:var(--font);-webkit-font-smoothing:antialiased;line-height:1.5;padding:var(--s8) var(--s6) 64px}
  .wrap{max-width:1180px;margin:0 auto}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--s4)}
  .mock-tag{display:inline-block;font-size:11px;letter-spacing:.04em;color:var(--gold-mid);border:1px solid rgba(212,175,55,.35);border-radius:var(--r-pill);padding:3px 10px}
  .planpick{display:inline-flex;align-items:center;gap:var(--s2);font-size:12px;color:var(--text-muted)}
  .seg2{display:inline-flex;background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r-pill);padding:3px}
  .seg2 button{border:0;background:transparent;color:var(--text-muted);font-size:12px;font-weight:600;padding:4px 12px;border-radius:var(--r-pill);cursor:pointer;transition:.2s}
  .seg2 button.on{background:var(--bg-muted);color:var(--text-primary)}
  h1{font-size:24px;font-weight:600;letter-spacing:-.01em;margin-bottom:var(--s2);color:var(--text-primary)}
  .sub{color:var(--text-muted);font-size:14px;margin-bottom:var(--s6)}
  svg{display:block}

  .presets{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--s3);margin-bottom:var(--s4)}
  .preset{position:relative;text-align:left;cursor:pointer;background:var(--bg-card);color:var(--text-primary);
    border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--s4);
    transition:transform .2s var(--ease-expo),box-shadow .2s,border-color .2s}
  .preset:hover{transform:translateY(-4px);border-color:var(--border-strong);box-shadow:var(--elev3),0 0 22px rgba(212,175,55,.13)}
  .preset.active{border-color:rgba(212,175,55,.45);box-shadow:0 0 0 1px rgba(212,175,55,.30),0 10px 34px rgba(212,175,55,.16)}
  .preset .top{display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s3)}
  /* タイル=シアン下地（不変）/ アイコングリフ=非選択シアン・選択中/ hoverゴールド発光 */
  .preset .ico{width:40px;height:40px;border-radius:var(--r-md);display:grid;place-items:center;flex:none;
    color:var(--color-accent);
    background:linear-gradient(135deg,rgba(56,189,248,.15),rgba(56,189,248,.04));
    border:1px solid rgba(56,189,248,.24);transition:color .2s var(--ease-std),filter .2s var(--ease-std)}
  .preset:hover .ico{color:var(--gold-mid);filter:drop-shadow(0 0 5px rgba(212,175,55,.55))}
  .preset.active .ico{color:var(--gold-mid);filter:drop-shadow(0 0 6px rgba(212,175,55,.5))}
  .preset .ico svg{width:21px;height:21px}
  .preset .name{font-size:15px;font-weight:600;color:var(--text-primary)}
  .preset .desc{font-size:12px;color:var(--text-muted);min-height:32px}
  .preset .foot{display:flex;align-items:center;justify-content:space-between;margin-top:var(--s3)}
  .count{font-size:13px;color:var(--text-secondary)}
  .count b{font-size:18px;font-weight:700;color:var(--text-primary);font-variant-numeric:tabular-nums;display:inline-block}
  .count b.pulse{animation:pop .24s var(--ease-spring)}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.26)}100%{transform:scale(1)}}
  .tier{font-size:10px;font-weight:600;letter-spacing:.03em;padding:2px 7px;border-radius:var(--r-pill)}
  .tier.free{color:var(--color-gain);background:rgba(52,239,129,.12)}
  .tier.pro{color:var(--gold-mid);background:rgba(212,175,55,.14)}
  .tier.prem{color:var(--color-warning);background:rgba(245,158,11,.12)}

  .refine{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:var(--s5);overflow:hidden}
  .refine .fh{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s5);cursor:pointer}
  .refine .fh .ti{display:flex;color:var(--text-muted)}.refine .fh .ti svg{width:16px;height:16px}
  .refine .fh .lbl{font-size:13px;font-weight:600;color:var(--text-primary)}
  .refine .fh .summ{font-size:12px;color:var(--text-muted)}
  .refine .fh .live{margin-left:auto;font-size:13px;color:var(--text-secondary)}
  .refine .fh .live b{font-size:20px;font-weight:700;color:var(--gold-mid);font-variant-numeric:tabular-nums;display:inline-block}
  .refine .fh .live b.pulse{animation:pop .24s var(--ease-spring)}
  .refine .fh .caret{color:var(--text-muted);transition:transform .25s var(--ease-expo);font-size:11px}
  .refine.open .fh .caret{transform:rotate(180deg)}
  /* 開閉: grid-template-rows 0fr↔1fr。開350ms/閉200ms 非対称 */
  .refine .fb{display:grid;grid-template-rows:0fr;transition:grid-template-rows .2s var(--ease-expo)}
  .refine.open .fb{grid-template-rows:1fr;transition-duration:.35s}
  .refine .fbwrap{overflow:hidden;min-height:0}
  .fbin{padding:var(--s4) var(--s5) var(--s5);border-top:1px solid var(--border)}
  .ctrlrow{display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s4);flex-wrap:wrap}
  .ctrl-lab{font-size:12px;color:var(--text-muted)}
  .seg{position:relative;display:inline-flex;background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r-pill);padding:3px}
  .seg .thumb{position:absolute;top:3px;bottom:3px;border-radius:var(--r-pill);background:var(--bg-muted);transition:transform .2s var(--ease-std),width .2s var(--ease-std);z-index:0}
  .seg button{position:relative;z-index:1;border:0;background:transparent;color:var(--text-muted);font-size:12px;font-weight:600;padding:5px 16px;border-radius:var(--r-pill);cursor:pointer;transition:color .2s}
  .seg button.on{color:var(--text-primary)}
  .customtag{font-size:10px;font-weight:700;color:var(--gold-mid);background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.3);border-radius:var(--r-pill);padding:2px 8px;display:none}
  .customtag.show{display:inline-block}
  .adv-toggle{display:flex;align-items:center;gap:var(--s2);font-size:12px;color:var(--text-secondary);cursor:pointer;margin-left:auto}
  .adv-toggle .sw{width:34px;height:20px;border-radius:var(--r-pill);background:var(--bg-muted);position:relative;transition:background .2s}
  .adv-toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text-muted);transition:transform .18s var(--ease-std),background .18s}
  .adv-toggle.on .sw{background:rgba(212,175,55,.35)}
  .adv-toggle.on .sw::after{transform:translateX(14px);background:var(--gold-mid)}
  .adv-toggle .pro{font-size:10px;font-weight:700;color:var(--gold-mid);background:rgba(212,175,55,.14);border-radius:var(--r-pill);padding:1px 7px}

  .lockbar{display:flex;align-items:center;gap:var(--s3);background:rgba(212,175,55,.07);border:1px solid rgba(212,175,55,.22);border-radius:var(--r-sm);padding:var(--s3) var(--s4);margin-bottom:var(--s4);font-size:12px;color:var(--text-secondary)}
  .lockbar b{color:var(--gold-mid)}
  .lockbar .cta{margin-left:auto;font-size:12px;font-weight:700;color:var(--bg-primary);background:linear-gradient(135deg,var(--gold-mid),var(--gold-dark));border:0;border-radius:var(--r-pill);padding:6px 14px;cursor:pointer;white-space:nowrap}

  .grouphd{grid-column:1/-1;font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.04em;margin:var(--s3) 0 2px;display:flex;align-items:center;gap:var(--s2)}
  .grouphd::after{content:"";flex:1;height:1px;background:var(--border)}
  .conds{display:grid;grid-template-columns:1fr 1fr;gap:var(--s2)}
  .crow{display:flex;align-items:center;gap:var(--s3);background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--s2) var(--s3);transition:opacity .2s,background .2s,border-color .2s;flex-wrap:wrap}
  .crow.off{opacity:.42}
  .crow .sw{width:34px;height:20px;border-radius:var(--r-pill);background:var(--bg-muted);position:relative;flex:none;cursor:pointer;transition:background .18s}
  .crow .sw::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text-muted);transition:transform .18s var(--ease-std),background .18s}
  .crow.on .sw{background:rgba(56,189,248,.32)}
  .crow.on .sw::after{transform:translateX(14px);background:var(--color-accent)}
  .crow .cl{font-size:12px;color:var(--text-secondary);flex:1;min-width:120px}
  .crow .th{font-size:11px;font-weight:700;color:var(--text-primary);background:var(--bg-muted);border:1px solid var(--border);border-radius:var(--r-pill);padding:3px 9px;transition:.2s}
  .crow .th.state{cursor:pointer;border-color:rgba(56,189,248,.4);color:var(--color-accent)}
  .crow .gate{font-size:10px;font-weight:700;color:var(--text-muted);background:var(--bg-muted);border:1px dashed var(--border-strong);border-radius:var(--r-pill);padding:3px 9px}
  .mseg{display:inline-flex;background:var(--bg-muted);border:1px solid var(--border);border-radius:var(--r-pill);padding:2px;width:100%;margin-top:6px;gap:2px}
  .mseg button{flex:1;border:0;background:transparent;color:var(--text-muted);font-size:10px;font-weight:700;padding:5px 2px;border-radius:var(--r-pill);cursor:pointer;transition:background .18s,color .18s;line-height:1.25}
  .mseg button .v{display:block;font-size:9px;font-weight:600;opacity:.85}
  .mseg button.on{background:rgba(212,175,55,.20);color:var(--gold-mid)}
  .mseg.locked{opacity:.5}.mseg.locked button{cursor:not-allowed}
  .fhint{font-size:11px;color:var(--text-muted);margin-top:var(--s4);line-height:1.6}

  .disclaimer{font-size:12px;color:var(--text-muted);background:var(--bg-subtle);border:1px solid var(--border);border-left:3px solid var(--color-warning);border-radius:var(--r-sm);padding:var(--s3) var(--s4);margin-bottom:var(--s5)}

  .md{display:grid;grid-template-columns:1.1fr 1fr;gap:var(--s4);align-items:start}
  .panel{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
  .panel .ph{padding:var(--s4) var(--s5);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:var(--s3)}
  .panel .ph h2{font-size:16px;font-weight:600;color:var(--text-primary)}
  .panel .ph .meta{font-size:12px;color:var(--text-muted);text-align:right}
  .sortsel{font-size:12px;color:var(--text-secondary);background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r-pill);padding:5px 10px;cursor:pointer}
  .seasonchip{display:inline-block;font-size:11px;color:var(--gold-mid);background:rgba(212,175,55,.10);border:1px solid rgba(212,175,55,.25);border-radius:var(--r-pill);padding:2px 9px}

  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:var(--s3) var(--s5);font-size:13px;border-bottom:1px solid var(--border);color:var(--text-secondary)}
  th{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.03em}
  tbody tr{cursor:pointer;transition:background .12s}
  tbody tr:hover{background:var(--bg-hover)}
  tbody tr.sel{background:rgba(212,175,55,.08);position:relative}
  tbody tr.sel td:first-child::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold-mid)}
  td:last-child,th:last-child{text-align:right}
  .tk{display:flex;align-items:center;gap:var(--s3)}
  .logo{width:26px;height:26px;border-radius:50%;flex:none;object-fit:cover;background:#fff}
  .mono{width:26px;height:26px;border-radius:50%;background:var(--bg-muted);display:none;place-items:center;font-size:10px;font-weight:700;color:var(--text-secondary);flex:none}
  .tk .nm{font-weight:600;color:var(--text-primary)}
  .tk .se{font-size:11px;color:var(--text-muted)}
  .num{font-variant-numeric:tabular-nums}
  .pos{color:var(--color-gain);font-weight:600}.warnc{color:var(--color-warning);font-weight:600}
  .chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--r-pill)}
  .chip.pass{color:var(--color-gain);background:rgba(52,239,129,.12)}
  .chip.brk{color:var(--color-accent);background:rgba(56,189,248,.12)}
  .chip.cup{color:var(--text-secondary);background:var(--bg-muted)}
  .chip.hot{color:var(--color-warning);background:rgba(245,158,11,.12)}

  .detail{padding:var(--s5)}
  .detail .vk{display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s4)}
  .detail .vlogo{width:46px;height:46px;border-radius:50%;background:#fff;object-fit:cover}
  .detail .vmono{width:46px;height:46px;border-radius:50%;background:var(--bg-muted);display:none;place-items:center;font-weight:700;font-size:14px;color:var(--text-secondary)}
  .detail .vname{font-size:22px;font-weight:600;letter-spacing:-.01em;color:var(--text-primary)}
  .detail .vmeta{font-size:12px;color:var(--text-muted)}
  .verdict{margin-left:auto;font-size:12px;font-weight:700;padding:5px 12px;border-radius:var(--r-pill);color:var(--color-gain);background:rgba(52,239,129,.14)}
  .cond{display:grid;grid-template-columns:1fr 1fr;gap:var(--s2);margin:var(--s4) 0}
  .cond .c{display:flex;align-items:center;gap:var(--s2);font-size:12px;background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--s2) var(--s3)}
  .cond .c .dot{width:8px;height:8px;border-radius:50%;background:var(--color-gain);flex:none}
  .cond .c .lbl{color:var(--text-secondary)}.cond .c .val{margin-left:auto;font-weight:700;color:var(--text-primary)}
  .reason{font-size:13px;color:var(--text-secondary);background:var(--bg-subtle);border:1px solid var(--border);border-radius:var(--r-sm);padding:var(--s4);margin-top:var(--s2)}
  .reason .rh{font-size:11px;color:var(--text-muted);margin-bottom:6px}
  .heat{display:grid;grid-template-columns:1fr 1fr;gap:var(--s2);margin-bottom:var(--s4)}
  .sec{border-radius:var(--r-sm);padding:var(--s3) var(--s4);border:1px solid var(--border)}
  .sec .sn{font-size:13px;font-weight:600;color:var(--text-primary)}.sec .sr{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;margin-top:2px}.sec .tag{font-size:10px;color:var(--text-muted)}
  .top3{font-size:12px;color:var(--text-secondary)}.top3 .h{font-size:11px;color:var(--text-muted);margin-bottom:6px}
  .top3 .row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
  .legend{font-size:11px;color:var(--text-muted);margin-top:var(--s4);display:flex;gap:var(--s4);flex-wrap:wrap}
  .legend span b{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:middle}

  @media (prefers-reduced-motion: reduce){
    *,.preset,.preset .ico,.sw::after,.seg .thumb,.count b,.refine .fb,.refine .caret{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="mock-tag">MOCKUP v6 ・ タブ切替を in-place 化（adv維持・ガクつき解消）</span>
    <span class="planpick">プラン確認:<span class="seg2"><button data-p="free" class="on">Free</button><button data-p="pro">Pro</button></span></span>
  </div>
  <h1>スクリーナー</h1>
  <p class="sub">戦略を選ぶ → 「絞り込み条件」で精度を調整。<b style="color:var(--text-secondary)">アドバンスド（Pro）で各条件を個別に緩急設定</b>。右上の Free/Pro で挙動が切替わります。</p>

  <div class="presets" id="presets"></div>

  <div class="refine" id="refine">
    <div class="fh" id="fhead"><span class="ti"></span><span class="lbl">絞り込み条件</span><span class="summ" id="fsumm"></span><span class="live">該当 <b id="flive">–</b> 銘柄</span><span class="caret">▼</span></div>
    <div class="fb"><div class="fbwrap"><div class="fbin">
      <div class="ctrlrow">
        <span class="ctrl-lab">精度</span>
        <div class="seg" id="seg"><span class="thumb" id="thumb"></span><button data-i="0">緩い</button><button data-i="1">標準</button><button data-i="2">厳しい</button></div>
        <span class="customtag" id="customtag">カスタム</span>
        <label class="adv-toggle" id="advToggle"><span class="sw"></span> アドバンスド（個別に緩急）<span class="pro">Pro</span></label>
      </div>
      <div id="lockslot"></div>
      <div class="conds" id="conds"></div>
      <div class="fhint" id="fhint"></div>
    </div></div></div>
  </div>

  <div class="disclaimer">これらは買い推奨ではなく、各戦略の<strong>条件に合致した銘柄の一覧</strong>です。最終的な投資判断はご自身で行ってください。</div>

  <div class="md">
    <div class="panel"><div class="ph"><h2 id="m-title">結果</h2>
      <div style="display:flex;align-items:center;gap:var(--s3)"><span class="meta" id="m-meta"></span>
        <select class="sortsel" id="sortsel"><option value="mcap">時価総額の大きい順</option><option value="vol">出来高の大きい順</option><option value="metric">主要指標の高い順</option><option value="sector">セクター順</option></select></div></div>
      <div id="m-body"></div></div>
    <div class="panel"><div class="ph"><h2 id="d-title">詳細</h2><span class="meta">最終更新 3 分前</span></div><div id="d-body"></div></div>
  </div>
</div>

<script>
const ICON={
  p1:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13l2 2 4-4"/></svg>',
  p2:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/></svg>',
  p3:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5" fill="currentColor" opacity=".85"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  p4:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M8.5 12.5 7 22l5-3 5 3-1.5-9.5"/></svg>',
  tune:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>',
};

 {id:'p3',name:'旬のセクター',tier:['pro','Pro'],base:0,sector:true,desc:'資金が向かうセクター × その中の好決算銘柄（テーマ物色）',
  title:'旬のセクター — セクター別 相対力',season:'セクター別RS（対SPY）・ 直近改善順',
  conds:[cond('topn','対象セクター（相対力 上位）','セクター',['上位5','上位3','上位2']),cond('inrs','セクター内 相対力','セクター',['上位30%','上位20%','上位10%']),cond('funda','決算も良い銘柄に限定','セクター',['必須'],{gate:true})],
  sectors:[{sn:'半導体',sr:'+14.2',tag:'相対力 上位・改善中',hot:true},{sn:'金融',sr:'+6.1',tag:'相対力 上位'},{sn:'通信',sr:'+4.5',tag:'改善方向'},{sn:'公益',sr:'+3.0',tag:'横ばい'},{sn:'ヘルスケア',sr:'-1.2',tag:'やや劣後',neg:true},{sn:'生活必需品',sr:'-3.4',tag:'劣後',neg:true}],

 {id:'p4',name:'セクター別リーダー',tier:['pro','Pro'],base:18,desc:'各セクター内で相対力が上位、かつ営業CFマージン15%以上',

  conds:[cond('inrs','セクター内 相対力','モメンタム',['上位10%','上位5%','上位3%']),cond('cfm','営業CFマージン','収益の質',['≥10%','≥15%','≥20%','≥25%']),cond('roe','ROE','収益の質',['≥17%','≥20%','≥25%','≥50%']),cond('cap','時価総額','規模',['中型↑','大型','大型']),cond('inst','機関保有 QoQ 増加','需給',['必須'],{gate:true})],

];
let active='p1',target=1,adv=false,sortKey='mcap',plan='free',lastLive=null;
function logoHTML(t,c,m){return `<img class="${c}" src="${LOGO(t)}" alt="${t}" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'"><div class="${m}">${t.slice(0,2)}</div>`}
function tierBadge(t){return `<span class="tier ${t[0]}">${t[1]}</span>`}
function lc(c){return Math.min(c.lvl,c.levels.length-1)}
function calcCount(p){
  if(p.sector)return p.conds.find(c=>c.k==='funda').on?9:23;
  let f=1;p.conds.forEach(c=>{if(c.gate){if(!c.on)f*=1.5;return}if(!c.on)f*=1.5;else f*=Math.pow(0.6,lc(c)-target)});
  return Math.max(2,Math.round(p.base*INT[target].m*f));
}
function isCustom(p){return p.conds.some(c=>!c.on||(!c.gate&&lc(c)!==target))}
function pulse(el){el.classList.remove('pulse');void el.offsetWidth;el.classList.add('pulse')}

function renderPresets(){
  document.getElementById('presets').innerHTML=PRESETS.map(p=>`
    <button class="preset ${p.id===active?'active':''}" data-id="${p.id}">
      <div class="top"><div class="ico">${ICON[p.id]}</div><div class="name">${p.name}</div></div>
      <div class="desc">${p.desc}</div>
      <div class="foot"><span class="count"><b>${calcCount(p)}</b> 銘柄</span>${tierBadge(p.tier)}</div></button>`).join('');
  document.querySelectorAll('.preset').forEach(el=>el.onclick=()=>{
    if(el.dataset.id===active)return;
    active=el.dataset.id;
    // DOM を作り直さず active クラスだけ in-place 切替（hover抜けのガクつき & 状態リセットを防止。adv/精度は維持）
    document.querySelectorAll('.preset').forEach(x=>x.classList.toggle('active',x.dataset.id===active));
    renderRefine();renderMD();updateCounts();
  });
}
function moveThumb(){const seg=document.getElementById('seg'),b=[...seg.querySelectorAll('button')];b.forEach((x,i)=>x.classList.toggle('on',i===target));const t=document.getElementById('thumb'),a=b[target];t.style.width=a.offsetWidth+'px';t.style.transform=`translateX(${a.offsetLeft-3}px)`}

// 件数・サマリー等のテキストのみ部分更新（DOM再構築しない=knobアニメ維持）
function updateCounts(){
  const p=PRESETS.find(x=>x.id===active),live=calcCount(p),el=document.getElementById('flive');
  if(el.textContent!=String(live)){el.textContent=live;pulse(el)}
  const onN=p.conds.filter(c=>c.on).length;
  document.getElementById('fsumm').textContent=`${p.name} ・ ${onN}/${p.conds.length} 条件 ON ・ 精度「${INT[target].n}」${adv?' ・ アドバンスド':''}`;
  document.getElementById('customtag').classList.toggle('show',isCustom(p));
  // preset cards
  document.querySelectorAll('.preset').forEach(el=>{const pp=PRESETS.find(x=>x.id===el.dataset.id),b=el.querySelector('.count b');if(b&&b.textContent!=String(calcCount(pp))){b.textContent=calcCount(pp);pulse(b)}});
  // lockbar (アドバンスドを触った時のみ・Free)
  const ls=document.getElementById('lockslot');
  if(adv&&plan==='free'&&!p.sector){ls.innerHTML=`<div class="lockbar">プリセットで <b>${live} 銘柄</b>に絞り込み中。条件を個別に詰めるには Pro へ（個別に締めるとさらに絞り込めます）。<button class="cta">Pro を見る</button></div>`;}
  else if(ls.innerHTML)ls.innerHTML='';
}
function buildConds(){
  const p=PRESETS.find(x=>x.id===active);
  let html='',lastG=null;
  p.conds.forEach((c,i)=>{
    if(c.g!==lastG){html+=`<div class="grouphd">${c.g}</div>`;lastG=c.g}
    let right;
    if(c.states)right=`<span class="th state" data-st="${i}">${c.states[c.state]}</span>`;
    else if(c.gate)right=`<span class="gate">${c.levels[0]==='必須'?'必須':c.levels[0]}</span>`;
    else right=`<span class="th">${LV[lc(c)]} ${c.levels[lc(c)]}</span>`;
    let mini='';
    if(adv&&!c.gate){const locked=plan==='free';
      mini=`<div class="mseg ${locked?'locked':''}">${c.levels.map((lv,li)=>`<button data-c="${i}" data-l="${li}" class="${li===lc(c)?'on':''}" ${locked?'disabled':''}>${LV[li]}<span class="v">${lv}</span></button>`).join('')}</div>`;
    }
    html+=`<div class="crow ${c.on?'on':'off'}" data-i="${i}"><div class="sw" data-i="${i}"></div><span class="cl">${c.cl}</span>${right}${mini}</div>`;
  });
  document.getElementById('conds').innerHTML=html;
  // bind: toggle (in-place), level (in-place), state
  document.querySelectorAll('#conds .sw').forEach(el=>el.onclick=()=>{
    const c=p.conds[+el.dataset.i],row=el.closest('.crow');c.on=!c.on;
    row.classList.toggle('on',c.on);row.classList.toggle('off',!c.on);updateCounts();
  });
  document.querySelectorAll('#conds .th.state').forEach(el=>el.onclick=()=>{const c=p.conds[+el.dataset.st];c.state=(c.state+1)%c.states.length;el.textContent=c.states[c.state];renderMD();updateCounts()});
  document.querySelectorAll('#conds .mseg button:not([disabled])').forEach(b=>b.onclick=()=>{
    const c=p.conds[+b.dataset.c];c.lvl=+b.dataset.l;
    b.parentElement.querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    const row=b.closest('.crow').querySelector('.th');if(row)row.textContent=`${LV[lc(c)]} ${c.levels[lc(c)]}`;
    updateCounts();
  });
}
function renderRefine(){
  document.getElementById('advToggle').classList.toggle('on',adv);
  buildConds();updateCounts();moveThumb();
  const p=PRESETS.find(x=>x.id===active);
  document.getElementById('fhint').innerHTML=p.sector
    ?'「決算も良い銘柄に限定」を外すと、相対力上位セクターの全銘柄に広がります。'
    :(active==='p2'?'「型」の値をクリックで状態切替（ブレイク確定／取っ手形成中／カップ形成中／すべて）。ブレイク後 +5%超は原典どおり「過熱（extended）」として除外。'
      :(adv?'':'<b style="color:var(--text-secondary)">アドバンスド（Pro）</b>で各条件を 緩・標・厳・最厳 に個別設定できます（二値の必須ゲートを除く）。'));
}
function sortRows(rows){const r=[...rows];if(sortKey==='mcap')r.sort((a,b)=>b.mcap-a.mcap);else if(sortKey==='vol')r.sort((a,b)=>b.vol-a.vol);else if(sortKey==='metric')r.sort((a,b)=>(b.m||0)-(a.m||0));else if(sortKey==='sector')r.sort((a,b)=>a.se.localeCompare(b.se,'ja'));return r}
function metricCell(p,r){if(p.id==='p1')return `<span class="pos">+${r.m}%</span>`;if(p.id==='p2')return `<span class="${r.m&&r.m<=5&&r.m>0?'warnc':''}">${r.mtxt}</span>`;if(p.id==='p4')return `<span class="num">${r.m}</span>`;return r.m}
function renderTable(p){const head=p.cols.map(c=>`<th>${c}</th>`).join('');const body=sortRows(p.rows).map(r=>`<tr class="${r.sel?'sel':''}"><td><div class="tk">${logoHTML(r.tk,'logo','mono')}<div><div class="nm">${r.tk}</div><div class="se">${r.nm} ・ ${r.se}</div></div></div></td><td>${metricCell(p,r)}</td><td>${r.c2[1]?`<span class="${r.c2[1]}">${r.c2[0]}</span>`:r.c2[0]}</td></tr>`).join('');return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`}
function renderDetail(d){return `<div class="detail"><div class="vk">${logoHTML(d.tk,'vlogo','vmono')}<div><div class="vname">${d.tk}</div><div class="vmeta">${d.nm} ・ ${d.se}</div></div><span class="verdict">${d.verdict}</span></div><div class="cond">${d.cond.map(c=>`<div class="c"><span class="dot"></span><span class="lbl">${c[0]}</span><span class="val">${c[1]}</span></div>`).join('')}</div><div class="reason"><div class="rh">合否の理由（条件結果から自動生成）</div>${d.reason}</div></div>`}
function renderSector(p){const heat=p.sectors.map(s=>{const col=s.hot?'var(--color-warning)':s.neg?'var(--color-loss)':'var(--color-gain)';const bg=s.hot?'rgba(245,158,11,.10)':s.neg?'rgba(248,113,113,.08)':'rgba(52,239,129,.08)';return `<div class="sec" style="background:${bg};border-color:${col}33"><div class="sn">${s.sn} ${s.hot?'<span class="chip hot">主戦場</span>':''}</div><div class="sr" style="color:${col}">${s.sr}</div><div class="tag">${s.tag}</div></div>`}).join('');return `<div class="detail"><div class="heat">${heat}</div><div class="top3"><div class="h">${p.top3title}</div>${p.top3.map(t=>`<div class="row"><span style="display:flex;align-items:center;gap:8px">${logoHTML(t[0],'logo','mono')}<b style="color:var(--text-primary)">${t[0]}</b> <span style="color:var(--text-muted)">${t[1]}</span></span><span class="chip pass">${t[2]}</span></div>`).join('')}</div><div class="legend"><span><b style="background:var(--color-warning)"></b>主戦場（資金流入・改善中）</span><span><b style="background:var(--color-gain)"></b>相対力 上位</span><span><b style="background:var(--color-loss)"></b>劣後</span></div></div>`}
function renderMD(){const p=PRESETS.find(x=>x.id===active);document.getElementById('m-title').textContent=p.title;document.getElementById('m-meta').innerHTML=p.season?`<span class="seasonchip">${p.season}</span>`:'';document.getElementById('sortsel').style.display=p.sector?'none':'';
  if(p.sector){document.getElementById('m-body').innerHTML=`<div style="padding:var(--s5);color:var(--text-secondary);font-size:13px">資金が向かうセクターを相対力（対SPY）で順位付けし、右に<b style="color:var(--text-primary)">ヒートマップ + 首位セクターの好決算 Top3</b>を表示します。</div>`;document.getElementById('d-title').textContent='セクター・ヒートマップ';document.getElementById('d-body').innerHTML=renderSector(p);}
  else{document.getElementById('m-body').innerHTML=renderTable(p);document.getElementById('d-title').textContent='詳細 — '+p.detail.tk;document.getElementById('d-body').innerHTML=renderDetail(p.detail);}}
function fullRender(){renderPresets();renderRefine();renderMD()}
document.getElementById('fhead').onclick=()=>{document.getElementById('refine').classList.toggle('open');setTimeout(moveThumb,30)};
document.getElementById('seg').querySelectorAll('button').forEach(b=>b.onclick=()=>{target=+b.dataset.i;renderRefine()});
document.getElementById('advToggle').onclick=e=>{e.preventDefault();adv=!adv;renderRefine()};
document.getElementById('sortsel').onchange=e=>{sortKey=e.target.value;renderMD()};
document.querySelectorAll('.planpick .seg2 button').forEach(b=>b.onclick=()=>{plan=b.dataset.p;document.querySelectorAll('.planpick .seg2 button').forEach(x=>x.classList.toggle('on',x.dataset.p===plan));renderRefine()});
document.getElementById('refine').classList.add('open');
fullRender();setTimeout(moveThumb,60);
</script>
